name: Publish to PyPI

on:
  workflow_dispatch:

jobs:
  build-n-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    steps:
    - name: Deprecated workflow notice
      run: |
        echo "This workflow is deprecated."
        echo "Publishing now happens in .github/workflows/release.yml after a new tag is created."
        echo "Use Release workflow by merging a version bump to main."
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
    - name: Build binary wheel and source tarball
      run: python -m build
    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
