# Re-runs the full test suite when a maintainer approves a PR (extra gate before merge).
# Releases are created after merge to main — see release.yml.

name: PR approved — tests

on:
  pull_request_review:
    types: [submitted]

jobs:
  test:
    if: github.event.review.state == 'approved'
    name: Test suite (on approval)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest
