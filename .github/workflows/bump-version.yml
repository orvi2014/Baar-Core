name: Bump version

# Trigger from GitHub UI: Actions → Bump version → Run workflow
# Bumps pyproject.toml, commits to main, and the release.yml workflow
# will automatically tag + publish to PyPI.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch   # 0.3.0 → 0.3.1  (bug fixes)
          - minor   # 0.3.0 → 0.4.0  (new features, backward-compatible)
          - major   # 0.3.0 → 1.0.0  (breaking changes)

permissions:
  contents: write

jobs:
  bump:
    name: Bump ${{ inputs.bump }} version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests before bumping
        run: pytest

      - name: Compute new version
        id: ver
        run: |
          CURRENT=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          BUMP="${{ inputs.bump }}"

          if [ "$BUMP" = "major" ]; then
            NEW="$((MAJOR + 1)).0.0"
          elif [ "$BUMP" = "minor" ]; then
            NEW="${MAJOR}.$((MINOR + 1)).0"
          else
            NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "new=${NEW}" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW ($BUMP)"

      - name: Update pyproject.toml
        run: |
          sed -i 's/^version = "${{ steps.ver.outputs.current }}"/version = "${{ steps.ver.outputs.new }}"/' pyproject.toml
          # Verify the change landed
          python3 -c "
          import tomllib
          v = tomllib.load(open('pyproject.toml','rb'))['project']['version']
          assert v == '${{ steps.ver.outputs.new }}', f'Expected ${{ steps.ver.outputs.new }}, got {v}'
          print(f'pyproject.toml version: {v}')
          "

      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add pyproject.toml
          git commit -m "chore(release): bump version to ${{ steps.ver.outputs.new }}"
          git push origin main

      - name: Summary
        run: |
          echo "### Version bumped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**${{ steps.ver.outputs.current }} → ${{ steps.ver.outputs.new }}** (${{ inputs.bump }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The \`release.yml\` workflow will now tag \`v${{ steps.ver.outputs.new }}\` and publish to PyPI automatically." >> "$GITHUB_STEP_SUMMARY"
